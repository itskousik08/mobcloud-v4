<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobclowd Pro</title>
    <link rel="stylesheet" href="style.css">
    <!-- CodeMirror CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.15/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.15/theme/vibrant-ink.min.css">
</head>
<body>
    <div class="main-grid">
        <!-- LEFT SIDEBAR: FILE EXPLORER -->
        <aside class="sidebar panel">
            <div class="sidebar-header">
                <h3>Project Files</h3>
            </div>
            <div id="file-explorer" class="file-explorer"></div>
        </aside>

        <!-- MIDDLE PANEL: AI CHAT -->
        <main class="chat-panel panel">
            <div id="chat-history" class="chat-history"></div>
            <div class="chat-input-area">
                <textarea id="prompt-input" placeholder="Tell the AI what to build..."></textarea>
                <button id="send-prompt-btn">Send</button>
            </div>
        </main>

        <!-- RIGHT PANEL: EDITOR & PREVIEW -->
        <section class="editor-panel panel">
            <div class="tab-header">
                <div class="tabs">
                    <button class="tab-btn active" data-tab="editor">Code Editor</button>
                    <button class="tab-btn" data-tab="preview">Live Preview</button>
                </div>
                <div class="preview-controls">
                    <!-- Desktop, Tablet, Mobile Icons -->
                </div>
            </div>
            <div id="editor-content" class="tab-content active">
                <div id="editor-tabs"></div>
                <div id="code-editor-container"></div>
            </div>
            <div id="preview-content" class="tab-content">
                <iframe id="preview-frame"></iframe>
            </div>
        </section>
    </div>

    <!-- CodeMirror JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.15/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.15/mode/xml/xml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.15/mode/javascript/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.15/mode/css/css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.15/mode/htmlmixed/htmlmixed.min.js"></script>
    
    <script src="app.js" type="module"></script>
</body>
</html>
